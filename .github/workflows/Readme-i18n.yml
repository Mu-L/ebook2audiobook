# .github/workflows/readme-i18n.yml
# Syncs the 25 README_<iso3>.md translations whenever the English README.md changes.
# Loop-safe: triggers only on README.md paths; the bot commit touches readme/*
# and tools/readme_i18n/* only, so it never re-triggers itself.
# No marketplace actions used (repo policy restricts to owner-only actions).

name: Sync README translations

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-i18n
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout (manual, no actions)
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --force "$GITHUB_SHA"

      - name: Update translations
        run: python3 tools/readme_i18n/update_translations.py

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add readme tools/readme_i18n/baseline_README.md tools/readme_i18n/cache.json
          if git diff --cached --quiet; then
            echo 'No translation changes to commit'
            exit 0
          fi
          git commit -m 'docs: sync README translations with English source [skip ci]'
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"
