services:
  ebook2audiobook:
    image: athomasson2/ebook2audiobook:${DEVICE_TAG:-cu128}  # or ebook2audiobook:${DEVICE_TAG:-cu128} if you run your own local docker
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-26.3.11}
        DEVICE_TAG: ${DEVICE_TAG:-cu128}
        BUILDAH_FORMAT: docker
      x-podman:
        format: docker
    working_dir: /app
    entrypoint: ["bash", "ebook2audiobook.sh", "--script_mode", "full_docker"]
    tty: true
    stdin_open: true
    ports:
      - "7860:7860"
    security_opt:
      - label=disable  # Required on SELinux/Podman hosts like Unraid/Fedora
    volumes:
      - ./ebooks:/app/ebooks:rw
      - ./audiobooks:/app/audiobooks:rw
      - ./models:/app/models:rw
      - ./voices:/app/voices:rw
      - ./tmp:/app/tmp:rw
    restart: unless-stopped

    # All are optional and harmless if the device/backend is not present
    devices:
      # NVIDIA CUDA – requires NVIDIA Container Toolkit + CDI generated on host
      - nvidia.com/gpu=all

      # Intel XPU / oneAPI / Arc iGPU / ROCm
      - /dev/dri:/dev/dri

      # AMD ROCm
      - /dev/kfd:/dev/kfd

    group_add:
      - video
      - render  # For Intel/AMD graphics access (harmless on NVIDIA/CPU)